name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy production
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: 5d03731e12b93ff46e23c27165d1421c
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set main as the production branch
        if: github.ref == 'refs/heads/main'
        run: |
          curl --fail-with-body --silent --show-error \
            -X PATCH "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/rynixai" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"production_branch": "main"}'

      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main'
        run: npx wrangler@4.86.0 pages deploy . --project-name rynixai --branch main
