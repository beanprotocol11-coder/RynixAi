# https://docs.devin.ai/onboard-devin/environment-yaml
# Commands run from the repo root.

initialize: |
  # No system-level setup needed; Node is provided by the environment.

maintenance: |
  npm install

knowledge:
  - name: start
    contents: |
      node server.js
  - name: lint
    contents: |
      # No lint script configured in this repo
  - name: test
    contents: |
      # No test script configured in this repo
  - name: notes
    contents: |
      Static frontend is index.html. server.js exposes /api/prices and /api/chat.
      The /api/chat endpoint uses an OpenRouter key (OPENROUTER_API_KEY) or an OpenAI key (OPENAI_API_KEY). If neither is set, the chatbot returns a configuration error.
      Additional pages: litepaper.html, terminal.html.
